name: build
permissions: read-all

on: [ push, workflow_dispatch ]

jobs:
  plugin-linter:
    runs-on: ubuntu-latest
    container:
      image: buildkite/plugin-linter@sha256:ecaccea76640e07e5d9da10bf65c66ab44e45615fb34be2f5b0066a870da0c79
      volumes:
        - ${{ github.workspace }}:/plugin
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - name: Buildkite plugin linter
        run: lint --id opzkit/pre-commit

  plugin-tester:
    runs-on: ubuntu-latest
    container:
      image: buildkite/plugin-tester@sha256:593fb0de4bee4f6d52ce6c6a2849720326bc8b284f7fc0700118932e3f4d10f9
      volumes:
        - ${{ github.workspace }}:/plugin
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - name: Buildkite plugin test
        run: "bats tests"
